name: Build APK (debug)

on:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Generate firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 -d > lib/firebase_options.dart

      - name: Set version code
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          sed -i "s/^version: .*/version: 1.0.$VERSION_CODE+$VERSION_CODE/" pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/bloop-messenger-release.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}"  > android/key.properties
          echo "keyPassword=${{ secrets.STORE_PASSWORD }}"   >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"           >> android/key.properties
          echo "storeFile=bloop-messenger-release.jks"       >> android/key.properties

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bloop-messenger-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 3
