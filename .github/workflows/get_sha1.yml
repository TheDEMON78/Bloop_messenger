name: Get Keystore SHA-1

on:
  workflow_dispatch:

jobs:
  sha1:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Print SHA-1
        run: |
          echo "=== SHA-1 du certificat ==="
          keytool -list -v \
            -keystore release.jks \
            -alias ${{ secrets.KEY_ALIAS }} \
            -storepass ${{ secrets.STORE_PASSWORD }} \
            -noprompt 2>/dev/null | grep -A1 'SHA1:'
