name: bloop_messenger
description: Application de messagerie sans serveur liée au numéro de téléphone.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^18.0.0
  uuid: ^4.5.1
  package_info_plus: ^10.0.0
  in_app_update: ^4.2.3
  flutter_background_service: ^5.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
