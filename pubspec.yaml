name: bloop_messenger
description: Application de messagerie sans serveur liée au numéro de téléphone.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^18.0.0
  uuid: ^4.5.1
  package_info_plus: ^10.0.0
  in_app_update: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "docs/app_icon.png"
  adaptive_icon_background: "#010D1F"
  adaptive_icon_foreground: "docs/app_icon.png"

flutter:
  uses-material-design: true
