name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'android/**'
      - 'windows/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/release.yml'

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      full: ${{ steps.ver.outputs.full }}
      android: ${{ steps.filter.outputs.android }}
      windows: ${{ steps.filter.outputs.windows }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'lib/**'
              - 'android/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - '.github/workflows/release.yml'
            windows:
              - 'lib/**'
              - 'windows/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - '.github/workflows/release.yml'

      - name: Compute version
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          MINOR=$((COUNT / 100))
          PATCH=$((COUNT % 100))
          VERSION="1.${MINOR}.${PATCH}"
          FULL="${VERSION}+${COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "full=${FULL}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        if: steps.filter.outputs.android == 'true' || steps.filter.outputs.windows == 'true'
        run: |
          PREV_RELEASE=$(git log --pretty=format:"%H %s" HEAD^ 2>/dev/null \
            | grep '\[release\]' | head -1 | awk '{print $1}')
          if [ -z "$PREV_RELEASE" ]; then
            PREV_RELEASE=$(git rev-list --max-parents=0 HEAD)
          fi
          NOTES=$(git log ${PREV_RELEASE}..HEAD --pretty=format:"• %s" \
            | grep -vi '\[release\]\|\[skip\]\|deploy\|workflow\|ci:\|build:\|chore:\|fix:\|feat:\|refactor:\|perf:\|test:\|sha\|fingerprint\|keystore\|firebase_\|pubspec\|version\|gradle' \
            | awk '!seen[$0]++' \
            | head -10)
          if [ -z "$NOTES" ]; then
            NOTES="• Améliorations et corrections diverses"
          fi
          printf "Bloop Messenger v${{ steps.ver.outputs.full }}\n\n%s" "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        if: steps.filter.outputs.android == 'true' || steps.filter.outputs.windows == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Bloop Messenger v${{ steps.ver.outputs.version }}
          body_path: release_notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    needs: setup
    if: needs.setup.outputs.android == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Generate firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 -d > lib/firebase_options.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Set version in pubspec
        run: |
          sed -i "s/^version: .*/version: ${{ needs.setup.outputs.full }}/" pubspec.yaml

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/bloop-messenger-release.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}"                        > android/key.properties
          echo "keyPassword=${{ secrets.STORE_PASSWORD }}"                         >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"                                 >> android/key.properties
          echo "storeFile=$(pwd)/android/app/bloop-messenger-release.jks"          >> android/key.properties

      - name: Build App Bundle
        run: flutter build appbundle --release --android-skip-build-dependency-validation

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Generate whatsnew for Play Store
        run: |
          PREV_RELEASE=$(git log --pretty=format:"%H %s" HEAD^ 2>/dev/null \
            | grep '\[release\]' | head -1 | awk '{print $1}')
          if [ -z "$PREV_RELEASE" ]; then
            PREV_RELEASE=$(git rev-list --max-parents=0 HEAD)
          fi
          NOTES=$(git log ${PREV_RELEASE}..HEAD --pretty=format:"• %s" \
            | grep -vi '\[release\]\|\[skip\]\|deploy\|workflow\|ci:\|build:\|chore:\|fix:\|feat:\|refactor:\|perf:\|test:\|sha\|fingerprint\|keystore\|firebase_\|pubspec\|version\|gradle' \
            | awk '!seen[$0]++' \
            | head -10)
          if [ -z "$NOTES" ]; then
            NOTES="• Améliorations et corrections diverses"
          fi
          mkdir -p whatsnew
          printf "%s" "$NOTES" > whatsnew/whatsnew-fr-FR

      - name: Upload Android artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v${{ needs.setup.outputs.version }} \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/bundle/release/app-release.aab \
            --repo ${{ github.repository }} --clobber

      - name: Upload to Play Store
        if: contains(github.event.head_commit.message, '[release]')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON }}
          packageName: com.bloop.messenger
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: alpha
          status: completed
          whatsNewDirectory: whatsnew

  windows:
    needs: setup
    if: needs.setup.outputs.windows == 'true'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install FlutterFire CLI and configure Firebase
        shell: powershell
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          dart pub global activate flutterfire_cli
          $env:PATH = "$env:LOCALAPPDATA\Pub\Cache\bin;$env:PATH"
          flutterfire configure `
            --project=bloop-messenger-95ea3 `
            --platforms=android,windows `
            --yes `
            --out=lib/firebase_options.dart

      - name: Regenerate Windows scaffold
        shell: powershell
        run: |
          if (Test-Path windows) { Remove-Item -Recurse -Force windows }
          flutter create --platforms=windows .

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Set version in pubspec
        shell: bash
        run: |
          sed -i "s/^version: .*/version: ${{ needs.setup.outputs.full }}/" pubspec.yaml

      - name: Build Windows
        run: flutter build windows --release

      - name: Create installer zip
        shell: powershell
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath bloop-messenger-windows-v${{ needs.setup.outputs.version }}.zip

      - name: Upload Windows artifact to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v${{ needs.setup.outputs.version }} \
            bloop-messenger-windows-v${{ needs.setup.outputs.version }}.zip \
            --repo ${{ github.repository }} --clobber
