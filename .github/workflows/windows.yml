name: Build Windows

on:
  push:
    branches:
      - app-windows

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate firebase_options.dart
        run: |
          [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String("${{ secrets.FIREBASE_OPTIONS_DART }}")) | Out-File -FilePath lib/firebase_options.dart -Encoding UTF8
        shell: powershell

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Compute version
        id: ver
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          MINOR=$((COUNT / 100))
          PATCH=$((COUNT % 100))
          VERSION="1.${MINOR}.${PATCH}"
          FULL="${VERSION}+${COUNT}"
          sed -i "s/^version: .*/version: ${FULL}/" pubspec.yaml
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "full=${FULL}" >> $GITHUB_OUTPUT

      - name: Build Windows
        run: flutter build windows --release

      - name: Create installer zip
        shell: powershell
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath bloop-messenger-windows-v${{ steps.ver.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-v${{ steps.ver.outputs.version }}
          name: Bloop Messenger Windows v${{ steps.ver.outputs.version }}
          body: |
            Version Windows de Bloop Messenger.

            **Installation :** extraire le zip et lancer `bloop_messenger.exe`
          files: bloop-messenger-windows-v${{ steps.ver.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
